<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmailSim v1.0 | Dashboard</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 50px;
        }

        .container {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            transition: all 0.3s ease;
        }

        .hidden { display: none !important; }

        /* Auth Screen Styling */
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--primary); }
        .price-tag { color: #27ae60; font-weight: bold; margin-bottom: 1.5rem; display: block; }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        button:hover { background-color: #1a252f; }

        /* Inbox Styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .email-item {
            padding: 15px;
            border-radius: 8px;
            background: #fff;
            border: 1px solid #eee;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .email-item:hover { background: #f9f9f9; transform: translateY(-2px); }

        .sender { font-weight: bold; font-size: 0.95rem; display: block; }
        .subject { color: #666; font-size: 0.85rem; }
        .timestamp { float: right; font-size: 0.75rem; color: #999; }

        /* Reading View */
        #reading-pane {
            border-top: 1px solid #eee;
            padding-top: 20px;
            margin-top: 20px;
        }

        .btn-back {
            background: none;
            color: var(--accent);
            width: auto;
            padding: 0;
            margin-bottom: 10px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <h1>Company Email Setup</h1>
        <span class="price-tag">License Fee: VC€ 0.00</span>
        
        <input type="text" id="user-name" placeholder="Full Name" required>
        <input type="email" id="user-email" placeholder="desired@company.com" required>
        
        <button onclick="handleSignUp()">Create Account</button>
    </div>

    <div id="app-screen" class="container hidden">
        <header>
            <h2 id="welcome-msg">Inbox</h2>
            <button style="width:auto; padding: 5px 10px;" onclick="location.reload()">Logout</button>
        </header>

        <div id="inbox-view">
            <div id="email-list">
                </div>
        </div>

        <div id="reading-pane" class="hidden">
            <button class="btn-back" onclick="toggleView('inbox')">← Back to Inbox</button>
            <h3 id="read-subject"></h3>
            <p id="read-sender" style="font-size: 0.8rem; color: #777;"></p>
            <hr>
            <p id="read-body"></p>
        </div>
    </div>

    <script>
        const state = {
            currentUser: "",
            emails: []
        };

        function handleSignUp() {
            const nameInput = document.getElementById('user-name').value;
            const emailInput = document.getElementById('user-email').value;

            if (!nameInput || !emailInput) {
                alert("Please fill in all fields.");
                return;
            }

            state.currentUser = nameInput;

            // Generate the automatic welcome email
            const welcomeEmail = {
                id: Date.now(),
                sender: "Admin @ ÖestVèl Systems",
                subject: "Account Activation Successful",
                body: `Hi ${nameInput},<br><br>Welcome to the team! Thanks for enjoying this email sim. This confirms your internal address at ${emailInput} is now live.<br><br>Regards,<br>System Ops`,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            state.emails.push(welcomeEmail);

            // UI Switch
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            renderInbox();
        }

        function renderInbox() {
            const list = document.getElementById('email-list');
            list.innerHTML = "";

            state.emails.forEach(email => {
                const div = document.createElement('div');
                div.className = "email-item";
                div.onclick = () => openEmail(email.id);
                div.innerHTML = `
                    <span class="timestamp">${email.time}</span>
                    <span class="sender">${email.sender}</span>
                    <span class="subject">${email.subject}</span>
                `;
                list.appendChild(div);
            });
        }

        function openEmail(id) {
            const email = state.emails.find(e => e.id === id);
            if (!email) return;

            document.getElementById('read-subject').innerText = email.subject;
            document.getElementById('read-sender').innerText = `From: ${email.sender}`;
            document.getElementById('read-body').innerHTML = email.body;

            toggleView('reading');
        }

        function toggleView(view) {
            if (view === 'reading') {
                document.getElementById('inbox-view').classList.add('hidden');
                document.getElementById('reading-pane').classList.remove('hidden');
            } else {
                document.getElementById('inbox-view').classList.remove('hidden');
                document.getElementById('reading-pane').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
