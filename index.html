<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnBusOffBus | ÖestVèl Centrè (Bargh)</title>
    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">OnBus<span>OffBus</span></div>
        <div id="status-badge" class="badge">Checking Location...</div>
    </nav>

    <header class="hero">
        <h1>Welcome to the New ÖestVèl Centrè</h1>
        <p>Now serving the Bath (Bargh) expansion with the same Harrogate reliability.</p>
    </header>

    <section class="map-container">
        <div id="map"></div>
        <div class="map-overlay">
            <h3>Live Route Tracker</h3>
            <p>Current Zone: <span id="zone-name">Detecting...</span></p>
            <button onclick="checkLocation()" class="cta-btn">Verify My Location</button>
        </div>
    </section>

    <script>
        // Coordinates for the new Bath/Bargh center
        const barghCoords = [-2.3590, 51.3751]; 

        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://demotiles.maplibre.org/style.json',
            center: barghCoords,
            zoom: 13
        });

        // Add a marker for the main terminal
        new maplibregl.Marker({ color: '#C5A059' })
            .setLngLat(barghCoords)
            .setPopup(new maplibregl.Popup().setHTML("<h4>ÖestVèl Centrè Terminal</h4>"))
            .addTo(map);

        function checkLocation() {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser");
                return;
            }

            navigator.geolocation.getCurrentPosition((position) => {
                const userLat = position.coords.latitude;
                const userLon = position.coords.longitude;
                
                // Simple bounding box check for the Bath/Bargh area
                const isInArea = (userLat > 51.3 && userLat < 51.4 && userLon > -2.4 && userLon < -2.3);

                const badge = document.getElementById('status-badge');
                const zoneText = document.getElementById('zone-name');

                if (isInArea) {
                    badge.innerText = "In ÖestVèl Network";
                    badge.style.background = "#28a745";
                    zoneText.innerText = "ÖestVèl Centrè (Bargh)";
                } else {
                    badge.innerText = "Outside Network";
                    badge.style.background = "#dc3545";
                    zoneText.innerText = "Remote (Roaming VC€ Applied)";
                }
                
                // Fly to user location
                map.flyTo({ center: [userLon, userLat], zoom: 14 });
            }, () => {
                alert("Location permission denied. Defaulting to Bargh Terminal.");
            });
        }
    </script>
</body>
</html>
