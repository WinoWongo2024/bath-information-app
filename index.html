<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ÖestVèl Regional Map & Time</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .flip-unit {
            background: #333;
            color: #ff9f43;
            padding: 2px 5px;
            border-radius: 4px;
            border-bottom: 2px solid #000;
            font-family: monospace;
            font-size: 1.2rem;
            display: inline-block;
            margin: 0 1px;
        }
        .popup-card { text-align: center; color: #222; }
        .vc-price { color: #27ae60; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>
    <h1>ÖestVèl Geotemporal Registry</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
