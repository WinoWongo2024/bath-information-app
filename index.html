<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ÖestVèl Geotemporal Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>
    <div class="legend">
        <h4>Timezone Key</h4>
        <div><span class="box utc-1"></span> West (UTC-1)</div>
        <div><span class="box utc-0"></span> Central (UTC+0)</div>
        <div><span class="box utc-30"></span> Gap (UTC+0:30)</div>
        <div><span class="box utc-plus-1"></span> East (UTC+1)</div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
