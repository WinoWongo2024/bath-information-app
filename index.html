<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÖestVèl Centrè | Mail Gateway</title>
    <style>
        :root {
            --sidebar-bg: #2c3e50;
            --sidebar-hover: #34495e;
            --top-bar: #ffffff;
            --bg-light: #f8f9fa;
            --accent: #3498db;
            --border: #e0e0e0;
            --text-main: #2d3436;
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg-light); }

        .hidden { display: none !important; }

        /* FULL PAGE LOGIN */
        #login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .login-box h1 { margin-top: 0; font-size: 1.5rem; color: var(--sidebar-bg); border-bottom: 2px solid var(--accent); display: inline-block; }

        .input-group {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin: 20px 0;
            overflow: hidden;
        }

        .input-group input { border: none; padding: 12px; flex: 1; outline: none; font-size: 1rem; }
        .domain { background: #eee; padding: 12px; color: #666; font-weight: bold; border-left: 1px solid var(--border); }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--sidebar-bg);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-login:hover { background: var(--accent); transform: translateY(-2px); }

        /* FULL PAGE APP LAYOUT */
        #app-page {
            display: grid;
            grid-template-columns: 260px 1fr;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }

        header {
            grid-column: 1 / 3;
            background: var(--top-bar);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        nav {
            background: var(--sidebar-bg);
            color: white;
            padding: 20px 0;
        }

        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li {
            padding: 12px 25px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        nav li:hover { background: var(--sidebar-hover); }
        nav li.active { border-left: 4px solid var(--accent); background: var(--sidebar-hover); }

        main { padding: 0; overflow-y: auto; background: white; }

        /* EMAIL LIST TABLE */
        .email-table { width: 100%; border-collapse: collapse; }
        .email-row { border-bottom: 1px solid var(--border); cursor: pointer; }
        .email-row:hover { background: #f1f4f9; }
        .email-row td { padding: 15px; font-size: 0.9rem; }
        .unread { font-weight: bold; }
        .time-col { color: #999; text-align: right; width: 100px; }

        /* READING VIEW */
        .email-content { padding: 40px; max-width: 800px; }
        .email-header { border-bottom: 1px solid var(--border); margin-bottom: 20px; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-box">
            <h1>ÖestVèl Mail</h1>
            <p style="font-size: 0.8rem; color: #7f8c8d;">Access your secure workstation node.</p>
            
            <input type="text" id="full-name" class="input-group" style="width:100%; border:1px solid #ddd; padding:12px; margin-bottom:0;" placeholder="Full Name">
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Employee ID / User">
                <div class="domain">@ostvl.ov</div>
            </div>
            
            <button class="btn-login" onclick="login()">Initialize System</button>
            <p style="text-align:center; font-size: 11px; color: #95a5a6; margin-top:20px;">
                License Balance: VC€ 0.00 | Location: Bath/Bargh
            </p>
        </div>
    </div>

    <div id="app-page" class="hidden">
        <header>
            <div style="font-weight: bold; letter-spacing: 1px;">ÖESTVÈL <span style="color:var(--accent)">CENTRÈ</span></div>
            <div id="user-display" style="font-size: 0.85rem; color: #666;"></div>
        </header>

        <nav>
            <ul>
                <li class="active">📥 Inbox</li>
                <li>📤 Sent</li>
                <li>📝 Drafts</li>
                <li>⚙️ Settings</li>
                <li onclick="location.reload()" style="margin-top: 50px; color: #e74c3c;">Logout</li>
            </ul>
        </nav>

        <main id="main-content">
            <div id="inbox-view">
                <table class="email-table" id="email-list">
                    </table>
            </div>

            <div id="reading-view" class="hidden">
                <div class="email-content">
                    <button onclick="showInbox()" style="border:none; background:none; color:var(--accent); cursor:pointer; margin-bottom:20px;">← Back to Inbox</button>
                    <div class="email-header">
                        <h2 id="view-subject" style="margin:0"></h2>
                        <p id="view-meta" style="color:#666; font-size: 0.85rem;"></p>
                    </div>
                    <div id="view-body"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // MOCK DATABASE LOGIC
        // This is where you would normally use fetch('your-sql-api-url')
        const DB = {
            saveUser: (user) => localStorage.setItem('ov_user', JSON.stringify(user)),
            getUser: () => JSON.parse(localStorage.getItem('ov_user')),
            getEmails: () => JSON.parse(localStorage.getItem('ov_emails')) || []
        };

        function login() {
            const name = document.getElementById('full-name').value;
            const handle = document.getElementById('username').value;

            if(!name || !handle) return alert("Credentials required.");

            const userData = { name, email: `${handle}@ostvl.ov` };
            DB.saveUser(userData);

            // Create initial welcome mail if database is empty
            if(DB.getEmails().length === 0) {
                const welcome = {
                    id: 1,
                    from: "System Admin",
                    subject: "Welcome to the Bath/Bargh Hub",
                    body: `Hello ${name},<br><br>Your connection to the ÖestVèl Centrè is now stable. Your local balance is <b>VC€ 0.00</b>. Glad to have you back.<br><br>Best,<br>IT Support`,
                    date: "Today"
                };
                localStorage.setItem('ov_emails', JSON.stringify([welcome]));
            }

            initApp();
        }

        function initApp() {
            const user = DB.getUser();
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('app-page').classList.remove('hidden');
            document.getElementById('user-display').innerText = `${user.name} | ${user.email}`;
            renderInbox();
        }

        function renderInbox() {
            const list = document.getElementById('email-list');
            const emails = DB.getEmails();
            list.innerHTML = emails.map(e => `
                <tr class="email-row unread" onclick="readEmail(${e.id})">
                    <td style="width: 200px;">${e.from}</td>
                    <td>${e.subject}</td>
                    <td class="time-col">${e.date}</td>
                </tr>
            `).join('');
        }

        function readEmail(id) {
            const email = DB.getEmails().find(e => e.id === id);
            document.getElementById('inbox-view').classList.add('hidden');
            document.getElementById('reading-view').classList.remove('hidden');
            
            document.getElementById('view-subject').innerText = email.subject;
            document.getElementById('view-meta').innerText = `From: ${email.from} | Received: ${email.date}`;
            document.getElementById('view-body').innerHTML = email.body;
        }

        function showInbox() {
            document.getElementById('inbox-view').classList.remove('hidden');
            document.getElementById('reading-view').classList.add('hidden');
        }

        // Check if already logged in on load
        window.onload = () => {
            if(DB.getUser()) initApp();
        }
    </script>
</body>
</html>
