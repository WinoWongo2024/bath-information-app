<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÖestVèl Geotemporal UK Registry</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #0b0e14; }
        #map { height: 100vh; width: 100%; background: #1a1d23; }

        .digital-clock {
            background: #000;
            color: #00ff41;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            border: 1px solid #333;
            margin: 8px 0;
            display: inline-block;
        }

        .popup-container { text-align: center; min-width: 160px; }
        .location-header { font-weight: bold; font-size: 1.1rem; color: #333; }
        .zone-tag { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        .legend {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5); width: 220px;
        }
        .legend h4 { margin: 0 0 10px 0; color: #2c3e50; border-bottom: 2px solid #3498db; }
        .line-key { display: flex; align-items: center; margin: 5px 0; font-size: 0.85rem; }
        .line-sample { width: 30px; height: 3px; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="legend">
        <h4>7-Zone UK Registry</h4>
        <div class="line-key"><div class="line-sample" style="background: #e74c3c;"></div> Zone 1 (West -1:00)</div>
        <div class="line-key"><div class="line-sample" style="background: #f1c40f;"></div> Zone 2 (-0:40)</div>
        <div class="line-key"><div class="line-sample" style="background: #2ecc71;"></div> Zone 3 (-0:20)</div>
        <div class="line-key"><div class="line-sample" style="background: #3498db; border: 2px dashed #000;"></div> Bath Center (0:00)</div>
        <div class="line-key"><div class="line-sample" style="background: #9b59b6;"></div> Zone 5 (+0:20)</div>
        <div class="line-key"><div class="line-sample" style="background: #e67e22;"></div> Zone 6 (+0:40)</div>
        <div class="line-key"><div class="line-sample" style="background: #34495e;"></div> Zone 7 (East +1:00)</div>
        <hr>
        <div class="line-key"><div class="line-sample" style="background: #ff6b6b; height: 10px; border-radius: 50%;"></div> The Gap (+0:30)</div>
        <div style="font-size: 0.75rem; color: #7f8c8d; margin-top: 5px;">Currency: VC€ 1.96</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Boundary Longitudes for 7 Zones across UK (~ -8 to +2 longitude)
        const boundaries = [
            { lng: -6.0, color: '#e74c3c', offset: -60 }, // Zone 1
            { lng: -4.5, color: '#f1c40f', offset: -40 }, // Zone 2
            { lng: -3.0, color: '#2ecc71', offset: -20 }, // Zone 3
            { lng: -2.498, color: '#3498db', offset: 0, name: 'BATH_WEST' },  // Keynsham Line
            { lng: -2.251, color: '#3498db', offset: 0, name: 'BATH_EAST' },  // Bradford Line
            { lng: -1.0, color: '#9b59b6', offset: 20 },  // Zone 5
            { lng: 0.5, color: '#e67e22', offset: 40 },   // Zone 6
            { lng: 2.0, color: '#34495e', offset: 60 }    // Zone 7
        ];

        const locations = [
            { name: "John O'groats", lat: 58.637, lng: -3.068 },
            { name: "Edinburgh", lat: 55.953, lng: -3.188 },
            { name: "Newcastle", lat: 54.978, lng: -1.617 },
            { name: "Manchester", lat: 53.480, lng: -2.242 },
            { name: "Bristol", lat: 51.454, lng: -2.587 },
            { name: "Bath", lat: 51.375, lng: -2.361 },
            { name: "London", lat: 51.507, lng: -0.127 },
            { name: "Penzance", lat: 50.118, lng: -5.537 },
            { name: "Radstock", lat: 51.291, lng: -2.447, isGap: true },
            { name: "Midsomer Norton", lat: 51.285, lng: -2.483, isGap: true },
            { name: "Paulton", lat: 51.306, lng: -2.502, isGap: true }
        ];

        const map = L.map('map').setView([54.5, -2.5], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Draw Vertical Boundary Lines
        boundaries.forEach(b => {
            const lineCoords = [[49, b.lng], [61, b.lng]];
            L.polyline(lineCoords, {
                color: b.color,
                weight: b.name ? 4 : 2,
                dashArray: b.name ? '10, 10' : null,
                opacity: 0.8
            }).addTo(map);
        });

        // The Gap Area Geofence (Orange Circle)
        L.circle([51.291, -2.46], {
            radius: 4500,
            color: '#ff6b6b',
            fillColor: '#ff6b6b',
            fillOpacity: 0.2,
            weight: 2
        }).addTo(map);

        function calculateTime(loc) {
            let now = new Date();
            let offsetMinutes = 0;

            if (loc.isGap) {
                offsetMinutes = 30; // The Gap Logic
            } else {
                // Determine zone based on longitude
                if (loc.lng < boundaries[0].lng) offsetMinutes = -60;
                else if (loc.lng < boundaries[1].lng) offsetMinutes = -40;
                else if (loc.lng < boundaries[2].lng) offsetMinutes = -20;
                else if (loc.lng < boundaries[4].lng) offsetMinutes = 0; // Bath/Central Zone
                else if (loc.lng < boundaries[5].lng) offsetMinutes = 20;
                else if (loc.lng < boundaries[6].lng) offsetMinutes = 40;
                else offsetMinutes = 60;
            }

            const localDate = new Date(now.getTime() + offsetMinutes * 60000);
            return {
                time: localDate.toTimeString().split(' ')[0],
                offset: offsetMinutes
            };
        }

        locations.forEach(loc => {
            const marker = L.marker([loc.lat, loc.lng]).addTo(map);
            
            const updatePopup = () => {
                const data = calculateTime(loc);
                const content = `
                    <div class="popup-container">
                        <div class="zone-tag">Offset: ${data.offset >= 0 ? '+' : ''}${data.offset}m</div>
                        <div class="location-header">${loc.name}</div>
                        <div class="digital-clock">${data.time}</div>
                        <div style="font-size:0.7rem">System: ÖestVèl OVST</div>
                    </div>
                `;
                marker.bindPopup(content, { closeButton: false }).openPopup();
            };

            marker.on('click', updatePopup);
        });

        // Refresh loop for the active clock
        setInterval(() => {
            const activePopup = document.querySelector('.leaflet-popup-content');
            if (activePopup) {
                const cityName = activePopup.querySelector('.location-header').innerText;
                const loc = locations.find(l => l.name === cityName);
                if (loc) {
                    const data = calculateTime(loc);
                    activePopup.querySelector('.digital-clock').innerText = data.time;
                }
            }
        }, 1000);

    </script>
</body>
</html>
