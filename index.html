<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÖestVèl Mail | Login</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #333;
            --border: #dcdde1;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 50px;
        }

        .container {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        .hidden { display: none !important; }

        /* Auth Screen Styling */
        h1 { font-size: 1.4rem; margin-bottom: 0.5rem; color: var(--primary); text-align: center; }
        .sub-text { text-align: center; font-size: 0.85rem; color: #7f8c8d; margin-bottom: 1.5rem; display: block; }

        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: var(--primary); }

        /* Domain Input Group */
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        .domain-suffix {
            background: #f8f9fa;
            padding: 0 15px;
            height: 100%;
            display: flex;
            align-items: center;
            color: #7f8c8d;
            font-weight: 500;
            border-left: 1px solid var(--border);
            user-select: none;
        }

        .standard-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        button:hover { background-color: #1a252f; }

        /* Inbox Styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .email-item {
            padding: 15px;
            border-radius: 8px;
            background: #fff;
            border: 1px solid #eee;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .email-item:hover { background: #f9f9f9; }
        .sender { font-weight: bold; font-size: 0.95rem; display: block; }
        .subject { color: #666; font-size: 0.85rem; }
        .timestamp { float: right; font-size: 0.75rem; color: #999; }

        #reading-pane { border-top: 1px solid #eee; padding-top: 20px; }
        .btn-back { background: none; color: var(--accent); width: auto; padding: 0; margin-bottom: 10px; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="auth-screen" class="container">
        <h1>ÖestVèl Centrè Portal</h1>
        <span class="sub-text">Setup your @ostvl.ov identity</span>
        
        <label>Full Name</label>
        <input type="text" id="user-name" class="standard-input" placeholder="e.g. Jess" required>

        <label>Work Email</label>
        <div class="input-group">
            <input type="text" id="user-handle" placeholder="username" required>
            <div class="domain-suffix">@ostvl.ov</div>
        </div>
        
        <button onclick="handleSignUp()">Activate Simulator</button>
        <p style="font-size: 0.7rem; text-align: center; color: #bdc3c7; margin-top: 15px;">
            Connection Fee: VC€ 0.00 | Secure Node: Bath/Bargh
        </p>
    </div>

    <div id="app-screen" class="container hidden">
        <header>
            <h2 id="welcome-msg" style="margin:0; font-size: 1.2rem;">Inbox</h2>
            <button style="width:auto; padding: 5px 10px; font-size: 0.8rem;" onclick="location.reload()">Logout</button>
        </header>

        <div id="inbox-view">
            <div id="email-list"></div>
        </div>

        <div id="reading-pane" class="hidden">
            <button class="btn-back" onclick="toggleView('inbox')">← Back to Inbox</button>
            <h3 id="read-subject" style="margin-top:10px;"></h3>
            <p id="read-sender" style="font-size: 0.8rem; color: #777;"></p>
            <hr>
            <div id="read-body" style="line-height: 1.5; font-size: 0.95rem;"></div>
        </div>
    </div>

    <script>
        const state = {
            currentUser: "",
            fullEmail: "",
            emails: []
        };

        function handleSignUp() {
            const name = document.getElementById('user-name').value;
            const handle = document.getElementById('user-handle').value;

            if (!name || !handle) {
                alert("Please provide both your name and preferred username.");
                return;
            }

            state.currentUser = name;
            state.fullEmail = `${handle}@ostvl.ov`;

            // Create the welcome email
            const welcomeEmail = {
                id: Date.now(),
                sender: "Admin @ ÖestVèl Systems",
                subject: "System Integration Confirmed",
                body: `Hello ${name},<br><br>Success! Your simulation profile is now active at <strong>${state.fullEmail}</strong>.<br><br>We have successfully migrated the data to the new <strong>ÖestVèl Centrè (Bath/Bargh)</strong> servers.<br><br>Thank you for enjoying this email sim!<br><br>Regards,<br>IT Support`,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            state.emails.push(welcomeEmail);

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `Inbox (${state.fullEmail})`;
            renderInbox();
        }

        function renderInbox() {
            const list = document.getElementById('email-list');
            list.innerHTML = "";

            state.emails.forEach(email => {
                const div = document.createElement('div');
                div.className = "email-item";
                div.onclick = () => openEmail(email.id);
                div.innerHTML = `
                    <span class="timestamp">${email.time}</span>
                    <span class="sender">${email.sender}</span>
                    <span class="subject">${email.subject}</span>
                `;
                list.appendChild(div);
            });
        }

        function openEmail(id) {
            const email = state.emails.find(e => e.id === id);
            if (!email) return;

            document.getElementById('read-subject').innerText = email.subject;
            document.getElementById('read-sender').innerText = `From: ${email.sender}`;
            document.getElementById('read-body').innerHTML = email.body;

            toggleView('reading');
        }

        function toggleView(view) {
            if (view === 'reading') {
                document.getElementById('inbox-view').classList.add('hidden');
                document.getElementById('reading-pane').classList.remove('hidden');
            } else {
                document.getElementById('inbox-view').classList.remove('hidden');
                document.getElementById('reading-pane').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
